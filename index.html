<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 300px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    #msg {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Acceso</h2>
  <input id="user" type="text" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
  <p id="msg"></p>
</div>

<script>
  function login() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    // Cambia estos valores por los que tú quieras
    const USER = "kevin";
    const PASS = "1234";

    if (u === USER && p === PASS) {
      window.location.href = "app.html"; // tu calculadora
    } else {
      document.getElementById("msg").innerText = "Usuario o contraseña incorrectos";
    }
  }
</script>

</body>
</html>
