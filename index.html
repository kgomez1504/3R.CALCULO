<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login 3R Ingeniería</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .login-box {
    background: #ffffff;
    padding: 40px;
    border-radius: 16px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .logo {
    width: 130px;
    margin-bottom: 20px;
  }

  h2 {
    margin-bottom: 20px;
    color: #0f172a;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
  }

  input:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 5px rgba(37,99,235,0.3);
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #1d4ed8;
  }

  #msg {
    margin-top: 15px;
    font-size: 13px;
    color: red;
  }
</style>
</head>

<body>

<div class="login-box">

  <!-- LOGO -->
  <img src="https://drive.google.com/uc?export=view&id=1Gwai3CTBb3VkHtJdY9DsXwekh74BjgbR" class="logo">

  <h2>Acceso</h2>

  <input id="user" type="text" placeholder="Correo">
  <input id="pass" type="password" placeholder="Contraseña">

  <button onclick="login()">Ingresar</button>

  <p id="msg"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://pkkblvultuuzgnuxxajs.supabase.co";
const supabaseKey = "TU_API_KEY_AQUI"; // 🔴 pega aquí tu anon public key

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function login() {
  const correo = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();

  if (!correo || !pass) {
    document.getElementById("msg").innerText = "Completa todos los campos";
    return;
  }

  const { data, error } = await supabaseClient
    .from("Usuarios3R")
    .select("Nombre")
    .eq("Correo", correo)
    .eq("Contraseña", pass)
    .maybeSingle();

  if (error) {
    console.error(error);
    document.getElementById("msg").innerText = "Error: " + error.message;
    return;
  }

  if (!data) {
    document.getElementById("msg").innerText = "Usuario o contraseña incorrectos";
    return;
  }

  alert("Bienvenido " + data.Nombre);
  window.location.href = "app.html";
}
</script>

</body>
</html>
