<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login 3R Ingeniería</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #c8cdd6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      display: flex;
      width: 680px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.18);
    }
    .panel-left {
      width: 240px;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 28px;
      flex-shrink: 0;
    }
    .panel-left img {
      width: 160px;
      height: auto;
      margin-bottom: 24px;
      background: #fff;
      border-radius: 14px;
      padding: 12px;
    }
    .panel-left .brand {
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 6px;
    }
    .panel-left .sub {
      color: #e02020;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }
    .panel-left .line {
      width: 32px;
      height: 2px;
      background: #e02020;
      border-radius: 2px;
      margin: 20px auto;
    }
    .panel-left .tagline {
      color: #555;
      font-size: 10px;
      letter-spacing: 1px;
      text-align: center;
      text-transform: uppercase;
      line-height: 1.8;
    }
    .panel-right {
      flex: 1;
      padding: 52px 40px 40px;
    }
    .panel-right h2 {
      font-size: 24px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }
    .panel-right .subtitle {
      font-size: 13px;
      color: #999;
      margin-bottom: 36px;
    }
    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: #555;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }
    .field input {
      width: 100%;
      padding: 12px 14px 12px 38px;
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      font-size: 14px;
      color: #111;
      background: #fafafa;
      outline: none;
      transition: all 0.2s;
    }
    .field input:focus {
      border-color: #e02020;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(224,32,32,0.08);
    }
    .btn {
      width: 100%;
      padding: 13px;
      background: #e02020;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn:hover { background: #c01a1a; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    #msg {
      margin-top: 12px;
      font-size: 12px;
      color: #e02020;
      text-align: center;
      min-height: 16px;
    }
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid #f0f0f0;
    }
    .footer span {
      font-size: 11px;
      color: #bbb;
    }
    .version {
      background: #f5f5f5;
      border: 1px solid #eee;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 10px;
      color: #aaa;
      font-weight: 700;
      letter-spacing: 1px;
    }
    @media (max-width: 600px) {
      .container { flex-direction: column; width: 100%; margin: 16px; border-radius: 16px; }
      .panel-left { width: 100%; padding: 32px; flex-direction: row; gap: 16px; justify-content: flex-start; }
      .panel-left .line, .panel-left .tagline { display: none; }
      .panel-right { padding: 32px 24px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="panel-left">
    <img src="logo.png" alt="3R Ingeniería">
    <div class="line"></div>
    <div class="tagline">Sistema de<br>Gestión</div>
  </div>
  <div class="panel-right">
    <h2>Bienvenido</h2>
    <p class="subtitle">Ingresa tus credenciales para continuar</p>
    <div class="field">
      <label>Usuario</label>
      <div class="input-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <input id="user" type="text" placeholder="Ingresa tu usuario">
      </div>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <div class="input-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="pass" type="password" placeholder="••••••••">
      </div>
    </div>
    <button class="btn" onclick="login()">Ingresar al sistema</button>
    <p id="msg"></p>
    <div class="footer">
      <span>3R Ingeniería © 2025</span>
      <span class="version">V 1.0</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
const supabaseUrl = "https://pkkblvultuuzgnuxxajs.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBra2JsdnVsdHV1emdudXh4YWpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTMxOTYsImV4cCI6MjA5MjYyOTE5Nn0.WpWrcMfAOKmf_nRCgU3wjVxjseC7J4G1mbXJRNmjAWo";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function login() {
  const correo = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();
  if (!correo || !pass) {
    document.getElementById("msg").innerText = "Completa todos los campos";
    return;
  }
  document.getElementById("msg").innerText = "";
  const { data, error } = await supabaseClient
    .from("Usuarios3R")
    .select("Nombre")
    .eq("Correo", correo)
    .eq("Contraseña", pass)
    .maybeSingle();
  if (error) {
    console.error(error);
    document.getElementById("msg").innerText = "Error: " + error.message;
    return;
  }
  if (!data) {
    document.getElementById("msg").innerText = "Usuario o contraseña incorrectos";
    return;
  }
  localStorage.setItem("usuario", data.Nombre);
  window.location.href = "menu_principal.html";
}
</script>
</body>
</html>
