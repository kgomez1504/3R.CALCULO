<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login 3R Ingeniería</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #d1d5db;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 36px 32px 28px;
      width: 340px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    }
    .logo-area {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-area img {
      width: 130px;
      height: auto;
      display: block;
      margin: 0 auto 10px;
    }
    .logo-area p {
      font-size: 11px;
      color: #999;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .divider {
      height: 1px;
      background: #f0f0f0;
      margin-bottom: 22px;
    }
    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      color: #111;
      background: #f9f9f9;
      outline: none;
      transition: all 0.2s;
    }
    .field input:focus {
      border-color: #e02020;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(224,32,32,0.1);
    }
    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      background: #e02020;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #c01a1a; }
    #msg {
      margin-top: 12px;
      font-size: 12px;
      color: #e02020;
      text-align: center;
      min-height: 16px;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
    }
    .version {
      display: inline-block;
      background: #f4f4f4;
      border: 1px solid #e5e5e5;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 10px;
      color: #999;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-area">
    <img src="logo.png" alt="3R Ingeniería">
    <p>Sistema de Gestión</p>
  </div>
  <div class="divider"></div>
  <div class="field">
    <label>Usuario</label>
    <input id="user" type="text" placeholder="Ingresa tu usuario">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input id="pass" type="password" placeholder="••••••••">
  </div>
  <button class="btn" onclick="login()">Ingresar al sistema</button>
  <p id="msg"></p>
  <div class="footer">
    <span class="version">V 1.0</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
const supabaseUrl = "https://pkkblvultuuzgnuxxajs.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBra2JsdnVsdHV1emdudXh4YWpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTMxOTYsImV4cCI6MjA5MjYyOTE5Nn0.WpWrcMfAOKmf_nRCgU3wjVxjseC7J4G1mbXJRNmjAWo";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function login() {
  const correo = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();
  if (!correo || !pass) {
    document.getElementById("msg").innerText = "Completa todos los campos";
    return;
  }
  document.getElementById("msg").innerText = "";
  const { data, error } = await supabaseClient
    .from("Usuarios3R")
    .select("Nombre")
    .eq("Correo", correo)
    .eq("Contraseña", pass)
    .maybeSingle();
  if (error) {
    console.error(error);
    document.getElementById("msg").innerText = "Error: " + error.message;
    return;
  }
  if (!data) {
    document.getElementById("msg").innerText = "Usuario o contraseña incorrectos";
    return;
  }
  localStorage.setItem("usuario", data.Nombre);
  window.location.href = "menu_principal.html";
}
</script>
</body>
</html>
