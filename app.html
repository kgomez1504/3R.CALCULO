<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel 3R Ingeniería</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
  }

  .container {
    text-align: center;
    margin-top: 80px;
  }

  .logo {
    width: 140px;
    margin-bottom: 20px;
  }

  h1 {
    margin-bottom: 40px;
  }

  .menu {
    display: flex;
    justify-content: center;
    gap: 30px;
  }

  .card {
    background: white;
    color: #0f172a;
    width: 220px;
    padding: 30px;
    border-radius: 16px;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-5px);
    background: #2563eb;
    color: white;
  }

  .card h2 {
    margin: 0;
  }
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <h1 id="bienvenida">Bienvenido</h1>

  <div class="menu">
    
    <div class="card" onclick="irCRM()">
      <h2>CRM</h2>
      <p>Gestión de clientes</p>
    </div>

    <div class="card" onclick="irCalculo()">
      <h2>Cálculo de Precio</h2>
      <p>Calculadora</p>
    </div>

  </div>

</div>

<script>
  // 🔹 Recuperar nombre del usuario
  const nombre = localStorage.getItem("usuario");

  if (nombre) {
    document.getElementById("bienvenida").innerText = "Bienvenido, " + nombre;
  }

  function irCRM() {
    alert("Módulo CRM en construcción");
  }

  function irCalculo() {
    window.location.href = "calculadora.html";
  }
</script>

</body>
</html>
