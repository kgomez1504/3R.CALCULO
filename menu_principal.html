<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel 3R Ingeniería</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #c8cdd6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      display: flex;
      width: 780px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.18);
    }
    .panel-left {
      width: 240px;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 28px;
      flex-shrink: 0;
    }
    .panel-left img {
      width: 160px;
      height: auto;
      margin-bottom: 24px;
      background: #fff;
      border-radius: 14px;
      padding: 12px;
    }
    .panel-left .line {
      width: 32px;
      height: 2px;
      background: #e02020;
      border-radius: 2px;
      margin: 20px auto;
    }
    .panel-left .tagline {
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      text-align: center;
      text-transform: uppercase;
      line-height: 2.5;
    }
    .panel-right {
      flex: 1;
      padding: 52px 40px 40px;
    }
    .panel-right h2 {
      font-size: 24px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }
    .panel-right .subtitle {
      font-size: 13px;
      color: #999;
      margin-bottom: 16px;
    }
    .timer-bar-wrap {
      height: 3px;
      background: #f0f0f0;
      border-radius: 3px;
      margin-bottom: 28px;
      overflow: hidden;
    }
    .timer-bar {
      height: 3px;
      width: 100%;
      background: #e02020;
      border-radius: 3px;
      transition: width 1s linear;
    }
    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 36px;
    }
    .card {
      border: 1.5px solid #e8e8e8;
      border-radius: 14px;
      padding: 24px 20px;
      cursor: pointer;
      background: #fafafa;
      transition: all 0.2s;
    }
    .card:hover {
      border-color: #e02020;
      background: #fff;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(224,32,32,0.1);
    }
    .card-icon {
      width: 40px;
      height: 40px;
      background: #fff0f0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .card h3 {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
    }
    .card p {
      font-size: 12px;
      color: #999;
    }
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 18px;
      border-top: 1px solid #f0f0f0;
    }
    .logout-btn {
      padding: 9px 18px;
      background: transparent;
      border: 1.5px solid #e02020;
      color: #e02020;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .logout-btn:hover {
      background: #e02020;
      color: white;
    }
    .version {
      background: #f5f5f5;
      border: 1px solid #eee;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 10px;
      color: #aaa;
      font-weight: 700;
      letter-spacing: 1px;
    }
    @media (max-width: 600px) {
      .container { flex-direction: column; width: 100%; margin: 16px; border-radius: 16px; }
      .panel-left { width: 100%; padding: 28px; flex-direction: row; gap: 16px; justify-content: flex-start; }
      .panel-left .line, .panel-left .tagline { display: none; }
      .panel-right { padding: 28px 20px; }
      .menu { grid-template-columns: 1fr; }
    }
  </style>
  <script>
    const usuario = localStorage.getItem("usuario");
    if (!usuario) window.location.href = "index.html";
  </script>
</head>
<body>
<div class="container">
  <div class="panel-left">
    <img src="logo.png" alt="3R Ingeniería">
    <div class="line"></div>
    <div class="tagline">Sistema de<br>Gestión</div>
  </div>
  <div class="panel-right">
    <h2 id="bienvenida">Bienvenido</h2>
    <p class="subtitle">Selecciona un módulo para continuar</p>
    <div class="timer-bar-wrap">
      <div class="timer-bar" id="timerBar"></div>
    </div>
    <div class="menu">
      <div class="card" onclick="irCRM()">
        <div class="card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e02020" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <h3>CRM</h3>
        <p>Gestión de clientes</p>
      </div>
      <div class="card" onclick="irCalculo()">
        <div class="card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e02020" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
        </div>
        <h3>Cálculo de Precio</h3>
        <p>Calculadora</p>
      </div>
    </div>
    <div class="footer">
      <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
      <span class="version">V 1.0</span>
    </div>
  </div>
</div>

<script>
  const nombre = localStorage.getItem("usuario");
  if (nombre) document.getElementById("bienvenida").innerText = "Bienvenido, " + nombre;

  function irCRM() { alert("Módulo CRM en construcción"); }
  function irCalculo() { window.location.href = "calculadora.html"; }
  function logout() {
    localStorage.removeItem("usuario");
    window.location.href = "index.html";
  }

  const TIEMPO_LIMITE = 3 * 60;
  let segundosRestantes = TIEMPO_LIMITE;
  let intervalo;

  function resetTimer() { segundosRestantes = TIEMPO_LIMITE; }

  function actualizarBarra() {
    const porcentaje = (segundosRestantes / TIEMPO_LIMITE) * 100;
    document.getElementById("timerBar").style.width = porcentaje + "%";
    if (segundosRestantes <= 0) {
      clearInterval(intervalo);
      localStorage.removeItem("usuario");
      window.location.href = "index.html";
    }
    segundosRestantes--;
  }

  ["mousemove", "keydown", "click", "scroll", "touchstart"].forEach(evento => {
    document.addEventListener(evento, resetTimer);
  });

  intervalo = setInterval(actualizarBarra, 1000);
</script>
</body>
</html>
