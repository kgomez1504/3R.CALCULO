<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel 3R Ingeniería</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Segoe UI',sans-serif;
  background:#c8cdd6;
}

.container{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#1a1a1a;
  padding:20px;
  color:white;
}

.sidebar img{
  width:140px;
  margin-bottom:20px;
}

.nav-item{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:5px;
}
.nav-item:hover{background:#2a2a2a;}

.main{
  flex:1;
  padding:30px;
  background:#f7f8fa;
}

.module-card{
  background:white;
  padding:20px;
  border-radius:12px;
  cursor:pointer;
  margin:10px;
  display:inline-block;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>

<!-- 🔒 PROTECCIÓN -->
<script>
const usuario = localStorage.getItem("usuario");
if(!usuario){
  window.location.href = "index.html";
}
</script>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <img src="logo.png">

  <div class="nav-item" id="modCRM" onclick="irCRM()">CRM</div>
  <div class="nav-item" id="modCalculo" onclick="irCalculo()">Cálculo de Precio</div>

  <div class="nav-item" onclick="logout()" style="color:red;">Cerrar sesión</div>
</div>

<!-- MAIN -->
<div class="main">

  <h2 id="bienvenida"></h2>

  <!-- BOTÓN SOLO ADMIN -->
  <button id="crearUsuarioBtn" onclick="crearUsuario()" style="background:green;color:white;margin:20px 0;">
    Crear Usuario
  </button>

  <!-- MÓDULOS -->
  <div>
    <div class="module-card" id="cardCRM" onclick="irCRM()">CRM</div>
    <div class="module-card" id="cardCalculo" onclick="irCalculo()">Cálculo</div>
  </div>

</div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://pkkblvultuuzgnuxxajs.supabase.co";
const supabaseKey = "TU_API_KEY";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

// 👤 USUARIO
const nombre = localStorage.getItem("usuario");
const rol = localStorage.getItem("rol");

document.getElementById("bienvenida").innerText = "Bienvenido, " + nombre;

// 🔐 PERMISOS (temporal)
const permisos = {
  admin: ["CRM","CALCULO","USUARIOS"],
  vendedor: ["CRM","CALCULO"],
  invitado: ["CALCULO"]
};

function aplicarPermisos(){
  const permisosRol = permisos[rol] || [];

  if(!permisosRol.includes("CRM")){
    document.getElementById("modCRM").style.display="none";
    document.getElementById("cardCRM").style.display="none";
  }

  if(!permisosRol.includes("CALCULO")){
    document.getElementById("modCalculo").style.display="none";
    document.getElementById("cardCalculo").style.display="none";
  }

  if(rol !== "admin"){
    document.getElementById("crearUsuarioBtn").style.display="none";
  }
}

aplicarPermisos();

// 🔓 LOGOUT
function logout(){
  localStorage.clear();
  window.location.href="index.html";
}

// 📂 NAVEGACIÓN
function irCRM(){
  alert("CRM en construcción");
}

function irCalculo(){
  window.location.href="calculadora.html";
}

// 👤 CREAR USUARIO (solo admin)
async function crearUsuario(){
  const nombre = prompt("Nombre:");
  const correo = prompt("Correo:");
  const pass = prompt("Contraseña:");
  const rol = prompt("Rol (admin/vendedor/invitado):");

  if(!nombre || !correo || !pass || !rol) return;

  const { error } = await supabaseClient
    .from("Usuarios3R")
    .insert([{
      Nombre:nombre,
      Correo:correo,
      Contraseña:pass,
      Rol:rol
    }]);

  if(error){
    alert("Error: "+error.message);
  }else{
    alert("Usuario creado");
  }
}
</script>

</body>
</html>
